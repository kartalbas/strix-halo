# ~/.config/llm-server/server.conf
# Example configuration — generated by llm-server.sh set commands
# Replace IPs with your actual machine addresses

# Node IPs (required for distributed mode)
HEAD_IP=<head-node-lan-ip>
WORKER_IP=<worker-node-lan-ip>

# Thunderbolt IPs (assigned by setup thunderbolt, defaults shown)
# HEAD_TB=10.0.0.1
# WORKER_TB=10.0.0.2

# Server settings
PARALLEL_SLOTS=1
CONTEXT_SIZE=131072
KV_CACHE_TYPE=q8_0
CONTAINER=native
BATCH_SIZE=4096
