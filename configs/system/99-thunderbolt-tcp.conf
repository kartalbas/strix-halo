# /etc/sysctl.d/99-thunderbolt-tcp.conf
# TCP tuning for high-bandwidth USB4 v2 Thunderbolt link (~80 Gbps)

# Increase socket buffer sizes for high-bandwidth link
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# TCP buffer auto-tuning range (min, default, max)
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# Use BBR congestion control
net.ipv4.tcp_congestion_control = bbr

# Enable TCP window scaling
net.ipv4.tcp_window_scaling = 1

# Increase backlog for high-throughput
net.core.netdev_max_backlog = 5000
